  name: Rename Finger
  description: Assign a friendly name to a specific fingerprint.
  fields:
    device_id:
      name: Lock Device
      description: The lock to update.
      selector:
        device:
          integration: tuya_ble
    user_id:
      name: User ID
      description: The ID (1-255) from the lock.
      required: true
      selector:
        number:
          min: 1
          max: 255
    fingerprint_id:
      name: Fingerprint ID
      description: The ID (1-255) from the lock.
      required: true
      selector:
        number:
          min: 1
          max: 255
    new_name:
      name: New Name
      description: The friendly name for this fingerprint.
      required: true
